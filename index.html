<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하라리의 별자리 운세</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            position: relative;
            overflow-x: hidden;
        }
        
        /* 별똥별 애니메이션 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        
        /* 컨텐츠 컨테이너 */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .content-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
        }
        
        .emoji {
            font-size: 4em;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        h1 {
            color: #ffd700;
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            font-weight: 700;
        }
        
        .subtitle {
            color: #e0e0e0;
            font-size: 1.2em;
            margin-bottom: 40px;
            font-weight: 300;
        }
        
        .zodiac-symbols {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .zodiac-symbol {
            font-size: 1.5em;
            opacity: 0.6;
            transition: all 0.3s ease;
            cursor: default;
        }
        
        .zodiac-symbol:hover {
            opacity: 1;
            transform: scale(1.3);
        }
        
        .blog-button {
            display: inline-block;
            padding: 20px 60px;
            font-size: 1.3em;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .blog-button:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .blog-button:hover:before {
            width: 300px;
            height: 300px;
        }
        
        .blog-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6),
                        0 0 30px rgba(255, 215, 0, 0.5);
            border-color: #ffd700;
        }
        
        .blog-button span {
            position: relative;
            z-index: 1;
        }
        
        .footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
            font-weight: 300;
        }
        
        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .content-box {
                padding: 40px 30px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .subtitle {
                font-size: 1em;
            }
            
            .blog-button {
                padding: 15px 40px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <!-- 별 생성 -->
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <div class="content-box">
            <div class="emoji">🌙✨</div>
            <h1>하라리의 별자리 운세</h1>
            <p class="subtitle">당신의 오늘을 밝혀줄 별빛</p>
            
            <div class="zodiac-symbols">
                <span class="zodiac-symbol">♈</span>
                <span class="zodiac-symbol">♉</span>
                <span class="zodiac-symbol">♊</span>
                <span class="zodiac-symbol">♋</span>
                <span class="zodiac-symbol">♌</span>
                <span class="zodiac-symbol">♍</span>
                <span class="zodiac-symbol">♎</span>
                <span class="zodiac-symbol">♏</span>
                <span class="zodiac-symbol">♐</span>
                <span class="zodiac-symbol">♑</span>
                <span class="zodiac-symbol">♒</span>
                <span class="zodiac-symbol">♓</span>
            </div>
            
            <a href="https://blog.naver.com/harari__brd" class="blog-button" target="_blank">
                <span>운세 블로그 방문하기 🌸</span>
            </a>
            
            <p class="footer">🐦 매일 업데이트되는 별자리 운세를 만나보세요</p>
        </div>
    </div>
    
    <script>
        // 랜덤 별 생성
        const starsContainer = document.getElementById('stars');
        const numberOfStars = 100;
        
        for (let i = 0; i < numberOfStars; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>

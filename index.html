<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하라리의 별자리 운세</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            position: relative;
            overflow-x: hidden;
        }
        
        /* 별똥별 애니메이션 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        
        /* 컨텐츠 컨테이너 */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .content-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
        }
        
        .emoji {
            font-size: 4em;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        h1 {
            color: #ffd700;
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            font-weight: 700;
        }
        
        .subtitle {
            color: #e0e0e0;
            font-size: 1.2em;
            margin-bottom: 40px;
            font-weight: 300;
        }
        
        .zodiac-symbols {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        
        .zodiac-symbol {
            font-size: 1.5em;
            opacity: 0.6;
            transition: all 0.3s ease;
            cursor: default;
        }
        
        .zodiac-symbol:hover {
            opacity: 1;
            transform: scale(1.3);
        }
        
        /* 최근 게시물 섹션 */
        .recent-posts {
            margin: 50px 0;
            width: 100%;
        }
        
        .section-title {
            color: #ffd700;
            font-size: 1.8em;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
        
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        @media (max-width: 900px) {
            .posts-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .post-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            display: block;
        }
        
        .post-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.3);
            border-color: rgba(255, 215, 0, 0.5);
        }
        
        .post-thumbnail {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5em;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            animation: float-slow 4s ease-in-out infinite;
        }
        
        @keyframes float-slow {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .post-content {
            padding: 20px;
        }
        
        .post-title {
            color: #fff;
            font-size: 1em;
            font-weight: 600;
            line-height: 1.4;
            margin: 0;
            text-align: left;
        }
        
        .post-date {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
            margin-top: 10px;
            text-align: left;
        }
        
        .page-copy-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: 600;
            color: #ffd700;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .page-copy-button:hover {
            background: rgba(255, 215, 0, 0.25);
            border-color: #ffd700;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
        }
        
        .page-copy-button:active {
            transform: translateY(0);
        }
        
        .page-copy-button.copied {
            background: rgba(76, 175, 80, 0.3);
            border-color: #4CAF50;
            color: #4CAF50;
        }
        
        .blog-button {
            display: inline-block;
            padding: 20px 60px;
            font-size: 1.3em;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .blog-button:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .blog-button:hover:before {
            width: 300px;
            height: 300px;
        }
        
        .blog-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6),
                        0 0 30px rgba(255, 215, 0, 0.5);
            border-color: #ffd700;
        }
        
        .blog-button span {
            position: relative;
            z-index: 1;
        }
        
        .footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
            font-weight: 300;
        }
        
        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }
            
            .content-box {
                padding: 30px 20px;
                border-radius: 20px;
            }
            
            .emoji {
                font-size: 3em;
                margin-bottom: 15px;
            }
            
            h1 {
                font-size: 1.8em;
                margin-bottom: 10px;
            }
            
            .subtitle {
                font-size: 0.95em;
                margin-bottom: 30px;
            }
            
            .zodiac-symbols {
                gap: 10px;
                margin-bottom: 35px;
            }
            
            .zodiac-symbol {
                font-size: 1.2em;
            }
            
            .recent-posts {
                margin: 35px 0;
            }
            
            .section-title {
                font-size: 1.4em;
                margin-bottom: 20px;
            }
            
            .posts-grid {
                grid-template-columns: 1fr;
                gap: 15px;
                margin-bottom: 30px;
            }
            
            .post-thumbnail {
                height: 150px;
                font-size: 4em;
            }
            
            .post-content {
                padding: 15px;
            }
            
            .post-title {
                font-size: 0.95em;
            }
            
            .post-date {
                font-size: 0.8em;
                margin-top: 8px;
            }
            
            .blog-button {
                padding: 15px 35px;
                font-size: 1em;
            }
            
            .footer {
                margin-top: 30px;
                font-size: 0.85em;
            }
            
            .page-copy-button {
                top: 12px;
                right: 12px;
                padding: 7px 12px;
                font-size: 0.75em;
                gap: 5px;
            }
        }
        
        /* 작은 모바일 (iPhone SE 등) */
        @media (max-width: 375px) {
            .content-box {
                padding: 25px 15px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .subtitle {
                font-size: 0.9em;
            }
            
            .zodiac-symbol {
                font-size: 1em;
            }
            
            .section-title {
                font-size: 1.2em;
            }
            
            .post-thumbnail {
                height: 130px;
                font-size: 3.5em;
            }
            
            .blog-button {
                padding: 12px 30px;
                font-size: 0.95em;
            }
            
            .page-copy-button {
                padding: 6px 10px;
                font-size: 0.7em;
            }
        }
    </style>
</head>
<body>
    <!-- 페이지 URL 복사 버튼 -->
    <button class="page-copy-button" onclick="copyPageURL()">
        <span class="copy-icon">🔗</span>
        <span class="copy-text">URL 복사</span>
    </button>
    
    <!-- 별 생성 -->
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <div class="content-box">
            <div class="emoji">🌙✨</div>
            <h1>하라리의 별자리 운세</h1>
            <p class="subtitle">당신의 오늘을 밝혀줄 별빛</p>
            
            <div class="zodiac-symbols">
                <span class="zodiac-symbol" title="양자리">🐏</span>
                <span class="zodiac-symbol" title="황소자리">🐂</span>
                <span class="zodiac-symbol" title="쌍둥이자리">👯</span>
                <span class="zodiac-symbol" title="게자리">🦀</span>
                <span class="zodiac-symbol" title="사자자리">🦁</span>
                <span class="zodiac-symbol" title="처녀자리">👧</span>
                <span class="zodiac-symbol" title="천칭자리">⚖️</span>
                <span class="zodiac-symbol" title="전갈자리">🦂</span>
                <span class="zodiac-symbol" title="사수자리">🏹</span>
                <span class="zodiac-symbol" title="염소자리">🐐</span>
                <span class="zodiac-symbol" title="물병자리">🏺</span>
                <span class="zodiac-symbol" title="물고기자리">🐟</span>
            </div>
            
            <!-- 최근 게시물 섹션 -->
            <div class="recent-posts">
                <h2 class="section-title">✨ 최근 업데이트</h2>
                <div class="posts-grid">
                    <a href="https://blog.naver.com/harari__brd/224200723420" class="post-card" target="_blank">
                        <div class="post-thumbnail">🐟</div>
                        <div class="post-content">
                            <h3 class="post-title">2026년 03월 물고기자리 월간 별자리운세 (데칸별)</h3>
                            <p class="post-date">2026. 03. 02</p>
                        </div>
                    </a>
                    
                    <a href="https://blog.naver.com/harari__brd/224200645209" class="post-card" target="_blank">
                        <div class="post-thumbnail">🏺</div>
                        <div class="post-content">
                            <h3 class="post-title">2026년 03월 물병자리 월간 별자리운세 (데칸별)</h3>
                            <p class="post-date">2026. 03. 01</p>
                        </div>
                    </a>
                    
                    <a href="https://blog.naver.com/harari__brd/224200632371" class="post-card" target="_blank">
                        <div class="post-thumbnail">🐐</div>
                        <div class="post-content">
                            <h3 class="post-title">2026년 03월 염소자리 월간 별자리운세 (데칸별)</h3>
                            <p class="post-date">2026. 03. 01</p>
                        </div>
                    </a>
                </div>
            </div>
            
            <a href="https://blog.naver.com/harari__brd" class="blog-button" target="_blank">
                <span>운세 블로그 방문하기 🌸</span>
            </a>
            
            <p class="footer">🐦 매일 업데이트되는 별자리 운세를 만나보세요</p>
        </div>
    </div>
    
    <script>
        // 랜덤 별 생성
        const starsContainer = document.getElementById('stars');
        const numberOfStars = 100;
        
        for (let i = 0; i < numberOfStars; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
            starsContainer.appendChild(star);
        }
        
        // 페이지 URL 복사 기능
        async function copyPageURL() {
            const button = event.currentTarget;
            const textElement = button.querySelector('.copy-text');
            const originalText = textElement.textContent;
            const pageURL = 'https://harari-test-page.vercel.app/';
            
            try {
                await navigator.clipboard.writeText(pageURL);
                
                // 복사 성공 피드백
                button.classList.add('copied');
                textElement.textContent = '복사완료!';
                
                // 2초 후 원래 상태로 복구
                setTimeout(() => {
                    button.classList.remove('copied');
                    textElement.textContent = originalText;
                }, 2000);
            } catch (err) {
                console.error('URL 복사 실패:', err);
                textElement.textContent = '복사 실패';
                setTimeout(() => {
                    textElement.textContent = originalText;
                }, 2000);
            }
        }
    </script>
</body>
</html>

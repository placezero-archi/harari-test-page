  "ishii_20260323.txt": "제목: [이시이유카리] 2026년 3월23일(월) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 3월 23일 (월) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n달은 황소자리에서 천왕성과의 합을 향해 가고 있습니다.\n튀어나오는 펀치. 마지막 순간에 날리는 한 방 같은 느낌.\n\n---\n\n오늘은 한마디로 표현해볼게요\n\n・양자리: 깜짝 상자\n・황소자리: 점프 업\n・쌍둥이자리: 머리의 스위치\n・게자리: 계획 변경\n・사자자리: 순발력\n・처녀자리: 스피드 업\n・천칭자리: 의외의 반응\n・전갈자리: 만남\n・사수자리: 센스 있는 다정함\n・염소자리: 대발견\n・물병자리: 이동이라는 환경\n・물고기자리: 깜짝 놀랄 좋은 소식\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리\n",
  "ishii_20260322.txt": "제목: [이시이유카리] 2026년 3월22일(일) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 3월 22일 (일) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 황소자리에 있으며, 수성, 화성, 목성과 소삼각형을 이룹니다.\n양자리에서는 태양, 해왕성, 토성의 스텔리움이 명왕성과 60도 각도를 이룹니다.\n\"바로 이쪽을 향하고 있었구나\" 하는 느낌으로 이야기가 풀립니다. 매끄럽게 일이 진행됩니다.\n\n---\n\n・양자리: 본인이 아무 말 하지 않아도 의중을 제대로 읽어주는 날입니다.\n\n・황소자리: 놀라운 진전이 있는 날입니다. 여러 가지 일이 긍정적으로 굴러갑니다.\n\n・쌍둥이자리: 중요한 것과 불필요한 것을 구분하는 날입니다. 마음의 정리가 됩니다.\n\n・게자리: 앞이 잘 보이는 날입니다. 앞으로의 일이 보이기 시작합니다. 조금 안심할 수 있습니다.\n\n・사자자리: 의욕이 샘솟는 날입니다. 누군가에게 자극받아 의욕이 생기기도 합니다.\n\n・처녀자리: 상쾌한 순풍을 느낄 수 있습니다. 복잡했던 생각이 깔끔하게 정리됩니다.\n\n・천칭자리: 강렬한 인상을 주는 만남의 날입니다. 개성 강한 사람과 관계하며 자신의 개성을 깨닫기도 합니다.\n\n・전갈자리: 만남의 날입니다. \"정말 대단한 인연이네!\" 하는 놀라움도 있을 수 있습니다.\n\n・사수자리: 좋아하는 일을 위해 열심히 하는 날입니다. 좋아서 노력합니다.\n\n・염소자리: \"오랜만에 즐겁다!\" 하는 느낌이 있을 수 있습니다. 자유 시간, 여가 시간입니다.\n\n・물병자리: 주변 일을 제대로 챙기는 날입니다. 외출 전에 정리하는 일 등.\n\n・물고기자리: 엄청난 발신력이 있는 날입니다. 작은 목소리도 꽤 멀리까지 전해집니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260321.txt": "제목: [이시이유카리] 2026년 03월21일(토) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 21일 (토) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n달은 오후 중반까지 양자리에 머물다가, 16시 전에 황소자리로 이동합니다.\n그때까지 태양과 달이 양자리에 함께 있어서, 유사한 신월 분위기가 형성됩니다.\n여러 가지 일들이 계속해서 시작되고 있습니다.\n수성은 오늘부터 순행으로 전환됩니다. 지난달 26일부터의 혼란스러운 상황이 정리되는 흐름을 타게 됩니다.\n\"조금 엉망이었지\" 하고 되돌아보면서, 거기서부터 흐름이 바뀌는 날입니다.\n\n---\n\n오늘은 짧게 가겠습니다.\n\n・양자리: 독립, 내 길을 가다. 알차고 뭐든지 할 수 있는 날.\n\n・황소자리: 저녁부터 스위치가 켜집니다.\n\n・쌍둥이자리: 숫자의 힘, 집단의 힘.\n\n・게자리: 이정표, 현재의 도달점.\n\n・사자자리: 강한 순풍을 타고, 컨디션이 올라갑니다.\n\n・처녀자리: 계속 받아들이는 날. 득템하는 날.\n\n・천칭자리: 인간관계에 휘말립니다. 북적북적.\n\n・전갈자리: 한결같음, 열심히 하는 모습.\n\n・사수자리: 파티 분위기, 대성황.\n\n・염소자리: 대청소, 모습 바꾸기.\n\n・물병자리: 투함, 발송.\n\n・물고기자리: 몇 가지 해결하고, 나머지에 집중.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리\n",
  "ishii_20260320.txt": "제목: [이시이유카리] 2026년 03월20일(금) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 20일 (금) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n태양이 양자리로 들어가는 날, 춘분입니다.\n다만 태양이 양자리에 들어가는 시각은 자정 직전 정도라서,\n낮 동안은 아직 물고기자리에 있습니다.\n선을 넘어설 때의 긴장감. 용기.\n\n---\n\n・양자리: 기세가 살아나는 날입니다. 새로운 전개가 연이어 일어납니다. 꽤 정신없을 수 있어요.\n\n・황소자리: \"전부 다 하자\"는 식이 아니라, 신경 쓰이는 부분에만 집중하는 방식을 택하고 싶어질지도 모릅니다.\n\n・쌍둥이자리: 점점 사람이 늘어나는 기분이 드는 날. 여러 곳에서 사람들이 모여듭니다.\n\n・게자리: 힘이 확 들어오는 날입니다. 크게 칭찬받거나 인정받는 장면도 있을 수 있어요.\n\n・사자자리: 점점 밖으로 나가게 되는 날. \"그동안 조금 틀어박혀 지냈구나\"하고 깨닫게 될지도.\n\n・처녀자리: 의외성이 많은 날입니다. \"그렇게 나오는구나!\" 같은 반응이 나올 수 있어요.\n\n・천칭자리: 누군가가 찾아와 줄지도 모릅니다. 또는 직접 만나러 가는 약속을 잡을 수도.\n\n・전갈자리: 점점 바빠지지만, 동시에 엄청나게 즐거워지기도 합니다.\n\n・사수자리: 반짝반짝 빛나는 즐거움의 날. 즐거움이 증폭되고, 기세가 더해집니다.\n\n・염소자리: 주변을 끌어들이는 날입니다. 또는 가까운 사람의 기세에 휩쓸리게 될 수도.\n\n・물병자리: 알찬 커뮤니케이션의 날. 계속해서 소통하게 됩니다.\n\n・물고기자리: 고비 하나를 넘긴 곳에서 또 다른 고비를 넘는 날. 최종 결론이 나오는 장면도 있을 수 있습니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260319.txt": "제목: [이시이유카리] 2026년 03월19일(목) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 19일 (목) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n물고기자리의 새로운 달. 춘분점을 사이에 두고 4개의 별이 밀집하게 겹치는 신월입니다.\n낮 12시 이후 달은 양자리로 이동합니다. 여기서부터 21일까지, 엄청난 \"전환점\"의 시간이 펼쳐집니다.\n준비된 무대로 뛰어들어가는 때. 작년부터 조금씩 갖춰온 조건들이 한꺼번에 활성화됩니다. 스위치가 켜지는 순간이에요.\n\n---\n\n・양자리: 새로운 일들이 연이어 시작됩니다. 닫혀 있던 문이 활짝 열립니다.\n\n・황소자리: 무엇을 생각해야 할지 명확해질 수 있어요. 집중해야 할 주제가 보입니다.\n\n・쌍둥이자리: 진행 중인 여러 미션 중 하나가 끝나서 홀가분해질지도. \n\n・게자리: 점점 바빠지기 시작합니다. 부수적인 일에서 \"본론으로 들어가는\" 듯한 변화가 있어요.\n\n・사자자리: 중요한 약속 하나를 지킬 수 있을 거예요. 부탁받았던 일을 깔끔하게 마무리합니다.\n\n・처녀자리: 중요한 협상을 하게 될지도. \"제대로 이야기를 정리하는\" 국면입니다.\n\n・천칭자리: 조금 떠 있던 안건이 오늘 내일 착지할 수 있어요. 궤도에 오릅니다.\n\n・전갈자리: 몇 가지 조건을 받아들인 뒤, \"구체적인 행동을 시작하는\" 장면.\n\n・사수자리: 마음속 회의가 잘 정리되어, 결론을 밖으로 내보내는 날입니다.\n\n・염소자리: \"연락이 닿는\" 날. 기다리던 소식이 올 수도 있어요.\n\n・물병자리: 요청을 표명하는 날입니다. \"이걸 원합니다\"라고 지정하거나 주문하는 때.\n\n・물고기자리: 여전히 특별한 별의 시간이 이어집니다. 거대한 출발선. 자신이 하고 있는 일의 의미를 깨닫게 됩니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260318.txt": "제목: [이시이유카리] 2026년 03월18일(수) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 18일 (수) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 물고기자리에 있으며, 화성과의 합(合)에서 목성과의 조화각으로 향하고 있습니다.\n계속해서 물의 별자리에 5개의 별이 모여 있어 매우 감성적입니다.\n정확한 신월은 19일이지만, 오늘도 충분히 신월의 에너지가 흐르고 있습니다.\n중요한 일들이 계속해서 시작되고 있습니다. 오락가락하면서, 혼란 속에서, 구름 뒤에서, 19일부터 20일 춘분을 향해 새로운 시작이 시작되고 있습니다.\n\n---\n\n・양자리: 자신의 손이 닿지 않는 곳에서 여러 가지 일들이 정리되는 그런 날입니다. 누군가의 도움을 받게 됩니다.\n\n・황소자리: 계속해서 \"다같이\"라는 분위기 속에 있는 날입니다. 앞으로의 일들을 모두와 함께 결정해 나갑니다.\n\n・쌍둥이자리: 큰 결단을 연이어 내리게 되는 날입니다. 이제 슬슬 결정하지 않으면 시간이 촉박해지는 그런 타이밍입니다.\n\n・게자리: 먼 곳과의 주고받음이 이어질 수 있습니다. 여러 가지 물건이나 소식이 도착할 수 있습니다.\n\n・사자자리: 재미있는 무언가가 돌아올 수 있습니다. 누군가가 골라준 것이 딱 맞는다거나 하는 일이 있을 수 있습니다.\n\n・처녀자리: 계속해서 인간관계가 매우 복잡하고 바쁩니다. 여러 사람과 주고받으며 이야기가 부풀어 오릅니다.\n\n・천칭자리: 기분 좋게 능력을 발휘할 수 있는 날입니다. 경험이 힘을 발휘합니다. 실력자로 인정받게 됩니다.\n\n・전갈자리: 계속해서 좋은 컨디션이 이어지는 날입니다. \"자신\"을 계속 드러내 나갑니다. 앞으로 나아갑니다. 뜨거운 사랑의 날입니다.\n\n・사수자리: 여러 사람이 선물을 들고 모여드는 것 같은 날입니다.\n\n・염소자리: 계속해서 밖으로 나가게 되는 그런 날입니다. 사소한 일이라도 밖으로 나가보세요.\n\n・물병자리: 임시 수입이라든지, 무언가 \"갑자기 손에 들어오는\" 것이 있을 수 있습니다.\n\n・물고기자리: 스케일이 큰 출발선에 서 있습니다. 한없이 유연하게. 제대로 반응합니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260317.txt": "제목: [이시이유카리] 2026년 03월17일(화) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 17일 (화) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 물고기자리에 있으며, 수성과 화성의 합 쪽으로 향하고 있습니다.\n정확한 신월은 19일이지만, 태양과 달이 같은 자리에 있어서 점성술적으로는 이미 신월 타임입니다.\n물고기자리에 4개의 별이 모여 있어요. 철썩철썩. 정신없이 여러 일들이 굴러갑니다.\n터널 출구가 코앞인, 어쩔 수 없는, 말없는 전진.\n\n---\n\n・양자리: 스스로의 세계 속으로, 자신만의 공간 속으로, 살짝 '파고드는' 느낌이 있을 수 있어요.\n\n・황소자리: 사람들이 모여서 뜨거운 분위기가 펼쳐지는 곳에, 과감하게 들어가는 느낌의 날입니다.\n\n・쌍둥이자리: 엄청나게 바빠질 것 같아요. 혼란 속에서 혼란을 증폭시키는 것 같지만, 사실 꽤 좋은 움직임을 보이고 있습니다.\n\n・게자리: 시야가 아주 넓어지는 날이에요. 활동 범위도 넓어집니다. 갑자기 어딘가에서 부름을 받을 수도 있어요.\n\n・사자자리: 좋은 의미에서 수동적인 날입니다. 여러 가지 일들이 전해져 오는데, 하나하나 신중히 살펴보게 됩니다.\n\n・처녀자리: 시끌벅적한 만남의 시간이 펼쳐져요. 여러 사람과 만나는 가운데, \"어라? 이 사람은...\" 같은 전개가 있을 수도 있습니다.\n\n・천칭자리: 정말 바쁜 날이에요. 할 일이 산더미처럼 쌓여 있고, 계속해서 움직이게 됩니다. 몸도 많이 움직여요.\n\n・전갈자리: 최고의 컨디션이 찾아오는 날입니다. 2025년 중반 이후, 좋은 날이 많았지만 이제 그 대미를 장식하는 시기에 접어들고 있어요. 4월 초까지 한두 번 더 있을지도 모릅니다.\n\n・사수자리: 집이나 내 영역에서 해야 할 일이 많은 날입니다. 안쪽으로 눈을 돌리게 됩니다.\n\n・염소자리: 소통의 소용돌이 속에 몸을 담그는 듯한 날이에요. 많은 주고받음이 이어집니다.\n\n・물병자리: 과감하게 쇼핑을 나서는, 그런 날입니다. 필요한 것들이 많이 있어요.\n\n・물고기자리: 여기서부터 19일까지, 특별한 시간에 접어듭니다. 새로운 일들이 계속 시작되고, 결정되어 갑니다. 큰 일이 있어요.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260316.txt": "제목: [이시이유카리] 2026년 03월16일(월) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 16일 (월) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 물병자리에 위치하고, 천왕성과의 스퀘어를 향해 가고 있습니다.\n거대한 출발선 앞에서 일어나는, 중요한 돌파구.\n\n오늘은 한마디로 가볼게요\n\n---\n\n・양자리: 집결\n\n・황소자리: 일점돌파\n\n・쌍둥이자리: 경쾌하게\n\n・게자리: 믿고 맡기기\n\n・사자자리: 팀을 이루다\n\n・처녀자리: 장인의 지혜\n\n・천칭자리: 자극\n\n・전갈자리: 방문\n\n・사수자리: 창의적 방법\n\n・염소자리: 수집\n\n・물병자리: 존재감\n\n・물고기자리: 교체\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260315.txt": "제목: [이시이유카리] 2026년 03월15일(일) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 15일 (일) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 물병자리에 있으며, 명왕성과의 합(コンジャンクション)을 지나 금성과의 60도(セクスタイル)로 향하고 있습니다. 화성, 수성과는 150도(セミヨード) 각도를 이루고 있습니다. 봄바람처럼 뜨겁고 강렬한 뉴스가 몰아칠지도 모르겠네요.\n\n---\n\n・양자리: 꽤 중요한 한 수를 두게 될지도 모릅니다. 앞을 내다보고 강하게 결단을 내려보세요.\n\n・황소자리: 숨겨왔던 야심이 드러나는 듯한 날입니다. \"그걸 노리고 있었구나\"라고 모두에게 보일 거예요.\n\n・쌍둥이자리: 여러 조건들이 갑자기 맞아떨어지면서 새로운 전개가 펼쳐지는 날! \n\n・게자리: 멋진 덤이 딸려와서 기쁜 일이 있을지도 모릅니다.\n\n・사자자리: 의외의 사람과 만날 수 있을지도 모릅니다. 아주 먼 곳에서 온 사람이라든가요.\n\n・처녀자리: 복잡한 작업이 술술 풀리는 날입니다. 어려운 가구를 조립하는 일 같은 거요.\n\n・천칭자리: 진한 사랑의 날입니다. 내용이 꽉 차 있어요. 말로 표현할 수 없을 정도로요.\n\n・전갈자리: 문득 집어 든 것에 엄청난 가치가 있는! 그런 날입니다.\n\n・사수자리: 자석에 이끌리듯 어딘가로 나가게 될지도 모릅니다. 가야만 했던 장소였던 거죠.\n\n・염소자리: 아주 가까운 곳에서 좋은 것을 발견하는 날입니다. 잃어버렸던 물건이 나온다든가요.\n\n・물병자리: 계속해서 움직일 수 있는 날입니다. 새로운 걸 시도할 수 있어요. 실험적인 시도를요.\n\n・물고기자리: 내가 움직이면 모든 게 움직이는, 그런 날입니다. 작은 행동에 강한 반응이 있을 거예요.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260314.txt": "제목: [이시이유카리] 2026년 3월14일(토) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 3월 14일 (토) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 염소자리에 있으며, 태양의 섹스타일에서 천왕성의 트라인으로 향하고 있습니다.\n조금 의외로운 전개가 있을 수 있어요. 변하지 않을 것 같았던 일이 문득 변할지도 모릅니다.\n\n---\n\n・양자리: 세세한 계획을 일정에 끼워 넣어 가는 날입니다.\n\n・황소자리: 다양한 사람들이 모이는 느낌의 날. 그런 무리에 들어가게 돼요.\n\n・쌍둥이자리: 재료나 수단을 선뜻 제공받아 크게 전진하는 날입니다.\n\n・게자리: 어딘가 재미있는 장소로 데려가 주는 이가 있을지도. 진지한 안내가 있어요.\n\n・사자자리: 현실과 정면으로 마주하는 느낌의 날. 눈앞의 일에 확실하게 집중해요.\n\n・처녀자리: 계속해서 사랑의 교류가 있는 날. 하고 싶은 말을 확실히 할 수 있고, 들어야 할 것을 들을 수 있어요.\n\n・천칭자리: 따스함과 다정함의 날. 너무 빡빡하게 틀에 가두지 않아요. 느슨하지만 깊게.\n\n・전갈자리: 엄청나게 즐거운 날. 즐거움을 만들어 내고, 로맨스를 연출해요.\n\n・궁수자리: 계속해서 여러 좋은 것들을 가지고 돌아올 수 있는 날. 가득한 선물이 있어요.\n\n・염소자리: 활발하게 대화할 수 있는 날. 모든 것을 제대로 설명할 수 있어요.\n\n・물병자리: \"보이지 않는 곳을 더 깨끗이 하는\" 그런 날. 뚜껑을 열어요.\n\n・물고기자리: 인간관계가 크게 넓어지는 날. 스스로 먼저 말을 걸 수 있어요.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리\n",
  "ishii_20260313.txt": "제목: [이시이유카리] 2026년 03월13일(금) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 13일 (금) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 염소자리에 있으며, 금성과의 스퀘어에서 화성, 수성, 목성의 조정 단계로 이동합니다.\n내면의 허세, 두려움에서 비롯된 강한 주장. 마음이 닫혀 있는 상태입니다.\n\n---\n\n・양자리: \"대성공!\"이라 외치고 싶은 순간이 찾아올 것 같아요. 하나의 목표 지점에 도달하는 날입니다.\n\n・황소자리: 넓게 펼쳐지는 하루. 바깥에서 여러 가지가 들어와요. 정보가 오거나 사람이 찾아오기도 합니다.\n\n・쌍둥이자리: \"어디 한번 해보자!\"는 마음으로 달려가는 날. 남의 눈치는 별로 신경 쓰지 않게 돼요.\n\n・게자리: 만남과 관계의 하루. 멀리서 뜨거운 메시지가 도착할지도 몰라요.\n\n・사자자리: 무언가 \"사이에 끼는\" 역할을 하게 될 것 같아요. 조정자 역할이랄까요.\n\n・처녀자리: 좋아하는 사람을 만날 수 있을지도. 아니면 약간 어색했던 사람을 좋아하게 되기도 해요.\n\n・천칭자리: 주변 사람들 일로 바빠질 수 있어요. 바깥보다는 안쪽에 중심을 두는 느낌의 하루입니다.\n\n・전갈자리: 하고 싶은 말을 쏟아내는 날. 그냥 가만히 있을 수가 없어요.\n\n・사수자리: 여러 물건을 손에 넣어서 방이 잠시 어질러지는 느낌의 날이에요.\n\n・염소자리: 활기차고 적극적인 하루. 척척 움직일 수 있어요. 발걸음이 가볍습니다.\n\n・물병자리: 수수하지만 가장 중요한 일이 정리되는 날. 중요한 한 걸음입니다.\n\n・물고기자리: 훨씬 앞을 내다보며 대담한 결정을 내릴 수 있는 날. 큰 비전이 보여요.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260312.txt": "제목: [이시이유카리] 2026년 03월12일(목) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 3월 12일 (목) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 오후 1시가 넘으면 사수자리에서 염소자리로 이동합니다.\n해왕성, 토성, 금성의 스퀘어와 화성의 섹스타일을 향해 나아가죠.\n오후부터 본격적으로 활기차게 움직이기 시작합니다. 과잉 반응과 행동력, 용기와 두려움이 묘하게 뒤섞이는 날입니다.\n\n오늘은 \"오전\" → \"오후\"의 흐름으로 가봅시다\n\n---\n\n・양자리: \"깊이 생각하며 준비\" → \"목표 달성의 순간\"\n\n・황소자리: \"편안한 만남\" → \"집중 학습 시간\"\n\n・쌍둥이자리: \"인연의 만남\" → \"수많은 사람들과 교류\"\n\n・게자리: \"진행 상황 점검\" → \"진지한 대화가 필요한 시간\"\n\n・사자자리: \"천진난만하게 즐기기\" → \"건강이 최우선\"\n\n・처녀자리: \"일상에 집중\" → \"삶이 장밋빛으로 변하는 순간\"\n\n・천칭자리: \"느긋하게 가는 하루\" → \"따뜻한 가족과의 시간\"\n\n・전갈자리: \"일상의 소소한 행복\" → \"자유롭고 능숙하게 움직이기\"\n\n・사수자리: \"거침없이 나아가기\" → \"일석이조의 성과\"\n\n・염소자리: \"옛것을 돌아보며 새로움 찾기\" → \"중심이 되는 역할\"\n\n・물병자리: \"새로운 시작\" → \"전략 수립의 시간\"\n\n・물고기자리: \"실력으로 승부\" → \"모두 함께 힘을 모으기\"\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리\n",
  "ishii_20260311.txt": "제목: [이시이유카리] 2026년 03월11일(수) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 11일 (수) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 사수자리에 있으며, 수성의 스퀘어에서 태양의 스퀘어로 향합니다.\n휘저으며 나아갑니다. 뭔가 의미가 있는 것 같지만, 사실 별 의미 없을 수도. 찰나적입니다.\n\n---\n\n・양자리: 굉장히 생각이 깊은 날입니다. 생각을 거듭한 끝에, 본심으로 행동합니다.\n\n・황소자리: 간접적으로 와닿는 일이 많을지도. 덤. 부산물 같은 것들.\n\n・쌍둥이자리: 계속해서 만남과 관계의 날. 협력해서 큰일을 해낼 수 있습니다.\n\n・게자리: 하나씩 하고 있는 것 같은데 웬일인지 워프하고 있는 듯한 날.\n\n・사자자리: 반짝반짝 즐거운 날. 아이디어에 여러 사람이 동참해줍니다.\n\n・처녀자리: 깜짝 놀랄 만큼 거리가 가까운, 그런 장면이 있을지도.\n\n・천칭자리: 술술 진행되는 날. 생각보다 속도가 납니다. 주변이 협력적이에요.\n\n・전갈자리: 좋아하는 것을 호화롭게 선택할 수 있는 날. 센스와 취향이 빛나는 날.\n\n・사수자리: 주변이나 발밑에 있는 일에 집중하는 날. 밖에서 좋은 것이 도착할 기운도.\n\n・염소자리: 폐쇄적인 장소에서 진한 이야기를 나누는, 그런 날. 비밀 이야기.\n\n・물병자리: 특별한 것을 다같이 나눠 즐기는, 그런 날. 공유.\n\n・물고기자리: 계속해서 대바쁘고 대활약하는 날. 목표했던 것에 제대로 손이 닿습니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리\n",
  "ishii_20260310.txt": "제목: [이시이유카리] 2026년 3월10일(화) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 3월 10일 (화) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n달은 사수자리에서, 해왕성, 토성, 금성, 명왕성의 작은 삼각형으로부터 화성의 스퀘어를 향해 움직입니다.\n왠지 혼돈스럽습니다. 혼돈의 불꽃놀이. 폭발.\n\n---\n\n・양자리: 쭉 먼 곳까지 갑니다. 넓어짐이 생겨납니다. \"그 너머\"로.\n\n・황소자리: 조금 사물을 보는 방식을 바꾸는 날. 비스듬히 봅니다. 뒤에서 봅니다.\n\n・쌍둥이자리: 멋진 만남의 시간. 큰 세계에 좋은 의미로 휘말려 들어갑니다.\n\n・게자리: 여러 일들이 잘 정리되어 가는 날. 척척 작업이 진행됩니다.\n\n・사자자리: 최상의 컨디션인 날. \"오랜만에 좋은 파도가 왔다\" 같은 손맛. 주먹 불끈.\n\n・처녀자리: 감히 결론을 내지 않는 느낌의 날. 이것저것 섞거나, 늘리거나 합니다.\n\n・천칭자리: 발놀림이 가벼운 날. 얼핏 가벼워 보이지만, 사실은 확실하게 내용이 있는 초대.\n\n・전갈자리: 작은 궁리로 좋은 것이 만들어지는, 그런 날. 숨은 맛, 향신료가 효과를 냅니다.\n\n・사수자리: 반짝반짝 즐거운 날. 과감하게 낸 아이디어가 대호평! 같은 전개라든가.\n\n・염소자리: 제대로 시간을 쓰는 느낌의 날. 흘려보내지 않습니다. 단축하지 않습니다. 중간을 건너뛰지 않습니다.\n\n・물병자리: 전개가 빠른 느낌의 날. 몇 가지 조건이 잘 맞물려서, 가속됩니다.\n\n・물고기자리: 대활약의 날. 조금 투박하거나, 뻔하더라도, 그것이 맛이 됩니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리\n",
  "ishii_20260309.txt": "제목: [이시이유카리] 2026년 3월9일(월) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 3월 9일 (월) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n월은 전갈자리에 있으며, 천왕성의 오포지션을 향한다.\n파괴력 만점. 숨겨져 있던 것들이 우르르 나올 수도 있다.\n\n오늘은 키워드로 전해보겠다.\n\n---\n\n・양자리: 마음의 여유, 그릇의 크기\n\n・황소자리: 전격적, (좋은 의미로) 충격적\n\n・쌍둥이자리: 실질, 내용, 충실\n\n・게자리: 과감한 주장\n\n・사자자리: 백업, 지원\n\n・처녀자리: 새로운 화제\n\n・천칭자리: 수리, 개조\n\n・전갈자리: 과감하게 부딪혀도 깨지지 않는다\n\n・사수자리: 발명, 마개조\n\n・염소자리: 3수 앞을 읽는다\n\n・물병자리: 달성감, 의외의 성과\n\n・물고기자리: 계속해서 최고조, 워프\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리\n",
  "ishii_20260308.txt": "제목: [이시이유카리] 2026년 03월08일(일) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 08일 (일) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n달은 전갈자리에서 목성, 수성, 태양과 트라인을 이룹니다. 물의 그랜드 트라인.\n막대한 유출. 내부의 논리. 양자리 스텔리움, 전망이 묘하게 낙관적입니다.\n\n---\n\n・양자리: 감정적인 날입니다. 감정이 매우 중요합니다. 마음을 헤아립니다.\n\n・황소자리: 계속해서 만남과 관계의 날. 볼륨감 있는 커뮤니케이션.\n\n・쌍둥이자리: 계속 바쁜 날입니다. \"노력하면 무엇을 얻을 수 있는지\"가 매우 명확합니다.\n\n・게자리: 어쨌든 뜻대로 하려고 합니다. 지금 바라면 꽤 이루어질지도.\n\n・사자자리: 벽장이나 폐쇄된 공간에 숨어들어 이것저것 뒤적이는 느낌의 날.\n\n・처녀자리: 교섭해보면 꽤 들어주는 날. 구하면 받을 수 있습니다.\n\n・천칭자리: \"이것의 쓸모를 찾았다!\" 같은 장면이 있을지도. 잡동사니가 보물로 변합니다.\n\n・전갈자리: 일시에 텐션이 올라갑니다. 개성이나 재능, 실력으로 승부해서 대승리할 수 있습니다.\n\n・사수자리: \"잠깐 곰곰이 생각해보자\" 같은 날. 보급일. 짧은 휴식으로 회복.\n\n・염소자리: 사람들에게 축복받는 날. 응원받고 인도받습니다. 인기가 나옵니다.\n\n・물병자리: 주역으로 왕성하게 움직이는 느낌의 날. 축적한 힘과 지혜, 재료를 성대하게 투입할 수 있습니다.\n\n・물고기자리: 절호조의 날. \"과감하게 가보자!\"로 꽤 잘 됩니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260307.txt": "제목: [이시이유카리] 2026년 03월07일(토) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 07일 (토) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 13시경 천칭자리에서 전갈자리로 이동합니다. 명왕성과 스퀘어, 화성과 트라인을 형성합니다.\n꽤 열기가 높습니다. 금성, 토성, 해왕성이 양자리에서 단고(한 덩어리)가 되어 있어 여기도 후끈거립니다. 어린아이에게 칼을 쥐어준 것 같은 위태로운 느낌도 듭니다.\n\n---\n\n・양자리: 조금 비껴간 방식으로 시도해보는 날입니다. 정면으로 가지 않는 느낌입니다.\n\n・황소자리: 뜨거운 사람에게는 뜨겁게 대응하는 날입니다. 온도를 높여가는 날입니다.\n\n・쌍둥이자리: 굉장히 바빠집니다. 할 수 있는 일이 많이 있다는 감촉이 느껴집니다.\n\n・게자리: 불가사의한 절정의 컨디션을 느낄 수 있을지도 모릅니다. 지금이라면 어디까지든 갈 수 있다는 직관이 옵니다.\n\n・사자자리: 여러 가지를 확인해가는 날입니다. 확인, 체크, 현재 위치를 확인합니다.\n\n・처녀자리: 연락이 쌩쌩 이어지는 날입니다. 혹은 스스로 여기저기에 메시지를 보냅니다.\n\n・천칭자리: 살짝 힘을 빼고, 이것저것 시도해보는 날입니다. 반응을 보는 등.\n\n・전갈자리: 오후부터 스위치가 켜집니다. 여기서부터 팔을 걷어붙이고 하고 싶은 일을 합니다.\n\n・사수자리: 신경 쓰이는 일을 처리해가는 날입니다. 미뤄뒀던 일을 처리합니다.\n\n・염소자리: 술술 진행되는 날입니다. 주변 사람들이 모두 협조적입니다. 길이 열려갑니다.\n\n・물병자리: 구체화해가는 날입니다. 머릿속에서 생각하던 것을 현실로 바꿔갑니다.\n\n・물고기자리: 뜨거운 마음이 헛돌지 않는 날입니다. 제대로 목표에 맞습니다. 손응답이 점점 나옵니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260306.txt": "제목: [이시이유카리] 2026년 03월06일(금) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 06일 (금) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 천칭자리에서 목성과의 스퀘어를 향하고 있습니다.\n금성은 저녁에 물고기자리에서 양자리로 이동합니다. 들어가자마자 토성, 해왕성과 만나게 됩니다.\n선이나 덕, 정의와 같은 것들의 메모 같은 느낌입니다.\n\n---\n\n・양자리: 조금 기쁜 약속이 잡힐지도 모릅니다. 내일 이후의 반짝이는 예정이 생깁니다.\n\n・황소자리: 모드가 바뀔지도 모릅니다. 반짝 안경을 빛내는 듯한 느낌입니다.\n\n・쌍둥이자리: 확실하게 요구사항을 내세우는 날입니다. 의견을 제대로 말하세요.\n\n・게자리: 앞으로의 일정에 대해 가족에게 설명하는 날입니다.\n\n・사자자리: 상당히 스케일이 큰 연락이 올지도 모릅니다. 이야기가 단숨에 확장됩니다.\n\n・처녀자리: \"이거 줄게\"라고 건네서 무척 기뻐하는 날입니다. 나중에 보답도 있을 거예요.\n\n・천칭자리: 계속해서 일이 진전됩니다. 내일 이후의 새로운 국면을 지금 준비합니다.\n\n・전갈자리: 여름방학 마지막 날 같은 날입니다. 숙제는 이제 됐으니 실컷 놀아둡시다.\n\n・사수자리: 계속 즐거워지는 날입니다. 즐거움의 기세가 우상향합니다.\n\n・염소자리: 개인적인 일에 대해 이해를 얻어서 훨씬 움직이기 쉬워지는 전개가 있을지도 모릅니다.\n\n・물병자리: 멋진 물건이 배달될지도 모릅니다. 들뜬 마음으로 상자를 여는 날입니다.\n\n・물고기자리: 푹 빠져서 응석부리자! 같은 날입니다. 사양은 하지 않겠다는 각오입니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260305.txt": "제목: [이시이유카리] 2026년 3월05일(목) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 3월 5일 (목) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 천칭자리에 있으며, 해왕성, 토성, 명왕성의 조정을 이어가고 있다.\n고비를 넘어 조정과 정리가 시작되는 느낌. 테이블에 앉는다.\n\n---\n\n・양자리: 특별한 만남의 날. 지금 가장 이야기해야 할 상대와 이야기를 나눌 수 있다.\n・황소자리: 여러 가지를 시도해보고 싶어질지도. 방법이 떠오른다. 수단을 찾게 된다.\n・쌍둥이자리: 강한 기세가 있는 날. 아이디어를 내놓으면 한순간에 모두가 휘말려준다는 식의 전개.\n・게자리: 발밑을 다지는 느낌의 날. 환경을 만든다. 조건을 정비한다.\n・사자자리: 훌쩍 밖으로 나가는 느낌의 날. 창문을 열고 바깥 공기를 들인다. 이야기를 듣는다.\n・처녀자리: 고비를 넘어 어깨의 힘이 조금 빠진다. 체세를 가다듬는다.\n・천칭자리: 자신의 턴이 온다. 공이 돌아와 새로운 일이 일어난다. 스스로 움직일 수 있다.\n・전갈자리: 조금 준비를 하는 느낌의 날. 장치를 만든다. 작전을 짠다.\n・사수자리: 포기하려던 일에 싹이 틀지도. 막다른 길이라고 생각했던 곳에 길이 생긴다.\n・염소자리: 큰 목표를 발견할지도. '이걸 좇아가보자' 같은 테마.\n・물병자리: 묘한 호조가 나타난다. 가보고 싶었던 장소에 갈 수 있다.\n・물고기자리: 계속 새로운 일이 시작되고 모두에게 도움을 받을 수 있다. 서포트에 혜택을 받는다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260304.txt": "제목: [이시이유카리] 2026년 03월04일(수) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 04일 (수) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 처녀자리에 있으며, 금성, 천왕성의 조정을 향해 나아갑니다.\n정확한 보름달(월식)은 어제 3일이었지만, 별점 관점에서는 4일도 여전히 보름달 모드입니다.\n일이 가득 차고 확장되어 가는 타이밍. 절정을 넘어가고, 고비를 넘어가는 때입니다.\n\n---\n\n・양자리: 정말 기쁜 일이 있을지도 모릅니다. 누군가의 사랑에 구원받는 듯한.\n\n・황소자리: 능동적으로 확 움직일 수 있습니다. 자신의 내면에서 나오는 힘, 사랑.\n\n・쌍둥이자리: 정말 좋은 목표를 달성할 수 있을 것 같습니다. 인간으로서 중요한 목표에 도달하는 날.\n\n・게자리: 계속해서 확장성 있는 커뮤니케이션의 날. 마음이 담깁니다.\n\n・사자자리: 점점 욕망을 해방시켜 나가는 날. 필요한 것을 분명히 전함으로써 길이 열립니다.\n\n・처녀자리: 계속해서 특별한 별의 시간 속에 있습니다. 누군가가 신비로운 세계로 데려다 줄지도 모릅니다.\n\n・천칭자리: 정말 좋은 면을 드러낼 수 있습니다. 실력을 발휘할 수 있고, 좋은 영향을 펼칠 수 있습니다.\n\n・전갈자리: 반짝반짝 빛나는 사랑의 날. 계속해서 엄청나게 좋은 일이 일어날 것 같습니다. 스스로 사랑을 표현해 나가세요.\n\n・사수자리: 대만족의 날. 마음 속 깊은 곳에서 \"좋았어!\"라고 생각할 수 있는 일이 일어납니다.\n\n・염소자리: 좋아하는 일이나 관심 있는 것을 위해 갑자기 외출하게 될지도 모릅니다. 또는 갓 만들어진 아이디어에 대해 줄줄이 이야기할 장소가 있을 수도 있습니다.\n\n・물병자리: 누군가 한 턱 낼지도 모릅니다. 또는 자신이 대접해서 매우 기뻐하는 일이 있을 수도 있습니다.\n\n・물고기자리: 계속해서 좋은 관계의 날. 조금 놀라운 커뮤니케이션이 생겨납니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260303.txt": "제목: [이시이유카리] 2026년 03월03일(화) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 03월 03일 (화) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n처녀자리의 월식. 날씨가 맑으면 (날씨가 안 좋을 것 같지만), 개기월식을 볼 수 있다.\n자세한 내용은 여기\nhttps://www.astroarts.co.jp/special/20260303lunar_eclipse/index-j.shtml\n별점 측면에서도 매우 중요한 전환점.\n하나의 세계에서 다음 세계로 이행하는, 그 고비의 혼란이 절정. 무리하게 떼어내는 듯한 느낌도.\n\n---\n\n・양자리: 조건이 갖춰지는 느낌의 날. 해야 할 일들이 쾅 하고 정리되거나.\n\n・황소자리: \"사랑의 미라클\"의 날. 사랑의 기적이 일어난다. 창조적인 (좋은 의미의) 폭발이 일어난다.\n\n・쌍둥이자리: 신비한 장소에 \"돌아오는\" 느낌이 있을 수도. 집 안에 재미있는 일이 일어나거나.\n\n・게자리: 멋진 메시지가 도착할지도. 조금 놀라운 주고받음이 발생하거나.\n\n・사자자리: 뭔가 가치 있는 것을 손에 넣을 듯. 이상한 경위로 손에 닿는 것.\n\n・처녀자리: 특별한 별의 시간. 중요한 전환점. 중요한 이벤트가 일어날지도. 오래 계속해 온 것이 보상받는다.\n\n・천칭자리: \"하늘의 은혜\"와 같은 일이 일어날지도. 계속 고민했던 것이 누군가 덕분에 해결되거나.\n\n・전갈자리: 깜짝 놀랄 만한 기쁜 일이 일어날지도. 예상의 훨씬 위를 가는 기쁨의 이벤트.\n\n・사수자리: 큰 성과를 거둘 수 있는 날. 골 앞에서 더 대단한 곳으로 워프하는 듯한 전개도.\n\n・염소자리: 누군가에게 강하게 초대받을지도. 어딘가에 초대받는 듯한 전개도. 여행의 기운.\n\n・물병자리: 맑은 마음이 될 것 같다. 누군가가 재미있는 제안을 해줄지도.\n\n・물고기자리: 멋진 만남과 관계의 날. 설레는 재회도. 만날 수 있다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260302.txt": "제목: [이시이유카리] 2026년 03월02일(월) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 3월 2일 (월) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n달은 21시 30분이 지나면 사자자리에서 처녀자리로 이동합니다. 화성은 자정 직전에 물병자리에서 물고기자리로 이동합니다. 달과 화성의 오포지션, 약간 느슨하지만 천왕성을 넣어 T스퀘어를 형성합니다. 무척 격렬하고, 파괴적이며, 화려합니다.\n\n---\n\n・양자리: 자기 자신의 의지를 관철하는 날입니다. 똑바로 관철합니다. 철저하게.\n\n・황소자리: 꽤 자신의 의지로 어떻게든 할 수 있을지도 모릅니다. 자신의 의지를 알고 있는 것이 포인트입니다.\n\n・쌍둥이자리: 갈 수 있는 곳까지 가보자는 방침입니다. 제한을 두지 않으면, 꽤 먼 곳까지 갈 수 있습니다.\n\n・게자리: 큰 돈을 쓰게 될지도 모릅니다. 또는, 특별한 재료를 팍 투입합니다.\n\n・사자자리: 1월 중순쯤부터의 진검승부의 피크를 넘어가는 날입니다. 고비입니다.\n\n・처녀자리: 꽤 어려운 부분에 손을 넣어 멋지게 수리를 완료하는 장면이 있을지도 모릅니다.\n\n・천칭자리: 희망을 제시하는 날입니다. 자신이 그린 그림에, 모두가 동참해주는 전개입니다.\n\n・전갈자리: 꽤 중요한 전환점에 서게 될지도 모릅니다. 큰 결단. 배짱이 결정됩니다.\n\n・사수자리: 아주 중요한 주고받기가 발생합니다. 끈질기게 주고받으며, 그 너머로 나갈 수 있습니다.\n\n・염소자리: 어디까지나 비유적인 의미로, 크게 걸어 크게 버는 날입니다.\n\n・물병자리: 자신의 힘이 '통하는' 실감을 느낄 수 있는 날입니다. 제대로 도달하고, 울립니다.\n\n・물고기자리: 고생이 재미있는 형태로 보답받을지도 모릅니다. 작은 노력의 축적으로 큰 바위가 갈라집니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260301.txt": "제목: [이시이유카리] 2026년 3월1일(일) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 3월 1일 (일) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n달은 사자자리에서 점점 커져간다.\n화성의 이동과 식(蝕)을 앞두고 조금 신비로운 분위기. 결정적인 전환점이 다가온다, 거기를 향한 준비.\n힘이 증폭되어 간다.\n\n---\n\n・양자리: 기운이 넘치고 즐겁다. 자유도가 높다.\n\n・황소자리: 차근차근 니즈에 응하는 느낌의 날. \"주변\"이 잘 보인다.\n\n・쌍둥이자리: 반가운 소식이 올지도. 필요한 정보가 모인다.\n\n・게자리: 성실한 날. 천천히 차근차근 진행한다.\n\n・사자자리: 생기 넘치는 날. 누군가를 맞이하러 가는 듯한 전개도.\n\n・처녀자리: 착착 준비를 진행하는 듯한 날. 중요한 이벤트가 눈앞에.\n\n・천칭자리: 매우 파워풀. 인간관계가 한 번에 넓어질지도.\n\n・전갈자리: 어느새 눈에 띄고 있는, 그런 날. 앞으로 나선다.\n\n・사수자리: 신기한 호조의 날. 어떤 장소에서도 자신의 힘이 통한다는 실감.\n\n・염소자리: 누군가에게 이끌려갈지도. 인연이 인연을 부른다.\n\n・물병자리: 고독이 치유될지도. 긴장이 풀린다.\n\n・물고기자리: 컨디션이 상승하는 날. 이것저것 정리되어 간다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리\n",
  "ishii_20260228.txt": "제목: [이시이유카리] 2026년 2월28일(토) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 2월 28일 (토) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n달은 17시가 지나면 게자리에서 사자자리로 이동한다.\n천왕성의 섹스타일에서 토성, 해왕성의 트라인으로.\n혼자서 중요한 일들을 연달아 결정해 나가는, 그런 흐름.\n\n---\n\n・양자리: 설레는 예정이 생길지도. 빛이 비춰든다.\n\n・황소자리: \"화살을 쏘는\" 듯한 장면이 있을지도. 던지다.\n\n・쌍둥이자리: 손에 들은 것이 마음에 충격을 가져다주는, 그런 장면이 있을지도.\n\n・게자리: 예정이 상당히 바뀔지도. 스케줄이 드라스틱하게 바뀐다.\n\n・사자자리: 몰래 노리던 표적에 명중! 같은 일이 있을지도.\n\n・처녀자리: 세계가 넓어지는 날. \"그런 방향성도 있었구나!\" 같은 발견.\n\n・천칭자리: 누군가의 의외의 리액션으로, 확 기세가 붙을지도.\n\n・전갈자리: 인간관계 속에서 한 꺼풀 벗는 느낌의 날. 상식에 얽매이지 않고 움직이는 용기.\n\n・사수자리: 조금 궁리했더니 엄청 통했다! 같은 전개가 있을지도.\n\n・염소자리: 조금 변한 감정 표현이 상대에게 확 꽂히는, 그런 날.\n\n・물병자리: 무척 잘 절차가 진행될지도. 안고 있던 것들이 차례차례 정리된다.\n\n・물고기자리: 대단한 아이디어가 떠오를지도. 바로 모두와 공유할 수 있다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260227.txt": "제목: [이시이유카리] 2026년 02월27일(금) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 02월 27일 (금) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n달은 게자리에 있으며, 목성과 합을 이룹니다.\n물의 별자리에 5개 행성이 있어 매우 습하고, 내면으로 이야기가 담기기 쉬운 날.\n\n---\n\n・양자리: 상냥함을 느끼는 날. 마음이 따뜻해진다. 집에 있는 사람도.\n\n・황소자리: 들뜨고 즐거운 날. 이곳저곳 돌아다닌다. 매우 활동적.\n\n・쌍둥이자리: 풍성하고 화려한 날. 야심적이 될 수 있다. 욕심을 낸다.\n\n・게자리: 기쁜 일이 있을 것 같다. 새로운 일들이 여러 가지 일어난다. 먼 곳에서 온다.\n\n・사자자리: 깊이 집중할 수 있다. 걱정거리를 누군가가 치워줄지도.\n\n・처녀자리: 인간관계가 반짝반짝 빛나는 날. 좋아하는 사람을 만날 수 있고, 소중히 대접받는다.\n\n・천칭자리: 계속해서 눈에 띄는 형태로 활약할 수 있는 날. 스포트라이트 속에서 기분 좋은 땀을 흘릴 수 있다.\n\n・전갈자리: 계속해서 절호조의 날. 뭐든지 잘 된다. 즐거워서 견딜 수 없다.\n\n・사수자리: 포근할 수 있는 날. 주변이 이것저것 도와준다.\n\n・염소자리: 나가서 사람을 만나는, 그런 날. 제대로 움직이고, 발신한다.\n\n・물병자리: 충실감이 있는 날. 손응답이 있다. 실제로 움직여 봐서 알게 되는 것.\n\n・물고기자리: 계속해서 넉넉한 사랑의 날. 철저히 즐기고, 마음을 쏟는다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260226.txt": "제목: [이시이유카리] 2026년 02월26일(목) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 02월 26일 (목) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 오후 2시 지나 쌍둥이자리에서 게자리로 이동합니다. 토성, 해왕성의 스퀘어.\n수성이 오늘부터 역행을 시작하여 3월 21일까지 계속됩니다. 혼란과 방향 전환이 겹칩니다.\n약간 억지스러운 전개도 있을 수 있습니다.\n\n---\n\n・양자리: 생각을 확실하게 표현할 수 있습니다. 마음에서 우러나오는 날.\n\n・황소자리: 은밀하게 생각하고 있던 일이 입 밖으로 나오는, 그런 날.\n\n・쌍둥이자리: 낮 12시까지 왕성하게 활동하고, 오후부터는 조금 차분해집니다.\n\n・게자리: 낮 12시부터 단숨에 바빠질 수도. 여러 가지를 확실하게 결정해 나갑니다.\n\n・사자자리: 평소와는 조금 다른 교류가 발생합니다. 미지의 영역.\n\n・처녀자리: 계속해서 활발하게 활약할 수 있습니다. 저녁에는 행복하게 안정됩니다.\n\n・천칭자리: \"출번이 온다\"는 느낌의 날. 누군가로부터 연락이 오기도.\n\n・전갈자리: 최상의 컨디션인 날. 큰 일이 진전됩니다. 또는, 좋아하는 일을 위해 멈출 수 있습니다.\n\n・사수자리: 받는 것이 많은 날. 선물이 가득. 덤까지.\n\n・염소자리: \"멈춰 서서 제대로 이야기하자\"는 식의 전환이 일어날 수도.\n\n・물병자리: \"재발견\"할 수 있는 것이 있을지도. \"이런 곳에 이런 게!\"하는 그것.\n\n・물고기자리: 사랑으로 가득한 날. 저녁으로 갈수록 점점 즐거워집니다. 서두르지 마세요.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260225.txt": "제목: [이시이유카리] 2026년 2월25일(수) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 2월 25일 (수) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n달은 쌍둥이자리에 있으며, 태양과의 스퀘어에서 금성과의 스퀘어로 향합니다.\n점점 휘젓고 다닙니다. 뒤죽박죽으로 만들어갑니다.\n\n---\n\n・양자리: 과감하게 대화에 끼어드는! 같은 스타일. 예정된 조화의 파괴.\n・황소자리: 여러 가지를 나눌 수 있습니다. 나눠보면서 연결이 만들어져갑니다.\n・쌍둥이자리: 대활약하는 날. 주역 같은 활약. 멋진 포지션에 설 수 있습니다.\n・게자리: 조용히 수면 아래에서 준비하는 느낌의 날. 착착 준비가 진행됩니다.\n・사자자리: 해방적인 날. 활짝 밝습니다. 기쁜 우연이 있습니다.\n・처녀자리: 열심히 힘낼 수 있는 날. 점점 앞으로 나아갑니다. 협력을 얻어냅니다.\n・천칭자리: 계속해서 절호조. 기세를 타고, 일단 갈 수 있는 데까지 갑니다.\n・전갈자리: \"조금 편승해볼까\" 같은 날. 기쁜 초대.\n・사수자리: 왁자지껄한 날. 여러 사람과 관계를 맺을 수 있고, 다가와 주기도 합니다.\n・염소자리: 착착 일이 진행되는 날. 한 걸음 한 걸음, 단계를 건너뛰지 않고 나아갑니다.\n・물병자리: 반짝반짝 즐거운 날. 좋아하는 일에 제대로 집중할 수 있습니다.\n・물고기자리: 현재 위치를 확실히 확인하는 날. 현상을 인식함으로써 궤도 수정이 가능합니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260224.txt": "제목: [이시이유카리] 2026년 02월24일(화) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 02월 24일 (화) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n\n달은 오전 중 황소자리에 있다가, 11시 반에 쌍둥이자리로 이동.\n토성, 해왕성, 명왕성의 작은 삼각형. 조금 강압적인 이야기 전개 방식.\n\n오늘은 \"오전\" → \"오후\"로 가자\n\n---\n\n・양자리: \"호두까기 인형\" → \"드라마틱\"\n\n・황소자리: \"날카롭게, 돌진하다\" → \"훨훨 상승\"\n\n・쌍둥이자리: \"비밀의 스파이스\" → \"명인의 솜씨를 선보이다\"\n\n・게자리: \"신기한 계기\" → \"작전을 짜다\"\n\n・사자자리: \"폭발력, 돌출\" → \"넓히다, 퍼뜨리다\"\n\n・처녀자리: \"과감하게 가다\" → \"형태를 다듬다\"\n\n・천칭자리: \"기상천외한 조정\" → \"절호조\"\n\n・전갈자리: \"강한 추진력\" → \"내 뜻을 얻었다\"\n\n・사수자리: \"세심한 준비\" → \"좋은 반응\"\n\n・염소자리: \"강하게 자기주장\" → \"길을 만들다\"\n\n・물병자리: \"장소를 지키다\" → \"세계를 만들다\"\n\n・물고기자리: \"나가다\" → \"도달하다\"\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260223.txt": "제목: [이시이유카리] 2026년 2월 23일 (월) 별자리운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 2월 23일 (월) | 번역: 하라리\n\n---\n\n오늘의 천체 배치\n달은 황소자리에 있으며, 목성의 섹스타일에서 화성의 스퀘어로 향합니다.\n매우 강렬합니다. 파도가 한꺼번에 퍼져나가는 이미지. 파도가 바위를 부숩니다.\n\n---\n\n・양자리: 동료나 가까운 사람을 위해 기꺼이 베푸는 날입니다. 풍요로운 하루.\n\n・황소자리: 신선하고 활력 넘치며 바쁜 날입니다. 정말 많이 움직이게 됩니다.\n\n・쌍둥이자리: 영감이 많이 떠오르는 날. 오랫동안 생각해왔던 것에 대해 좋은 아이디어가 생깁니다.\n\n・게자리: 재미있는 일에 초대받을 수도 있습니다. 설레는 일이 생깁니다.\n\n・사자자리: 계속해서 기운이 넘치고 활력이 있는 날입니다. 어떤 도전을 하게 됩니다.\n\n・처녀자리: 흐름을 탈 수 있는 날. 바쁨을 지혜로 헤쳐나갈 수 있습니다. 경험의 승리.\n\n・천칭자리: \"이야기를 잘 끌어내는\" 장면이 있을 수 있습니다. 마음을 열게 하는 기술.\n\n・전갈자리: 협력하여 일을 처리하는 느낌의 날. 꽤 깊이 있게 도움을 받을 수 있습니다.\n\n・사수자리: 꾸준한 노력이 결실을 맺을 수 있습니다. 누군가가 문득 반응해주고, 거기서부터 확대됩니다.\n\n・염소자리: 멋진 사랑의 날. 작은 우기심도 술술 통하게 됩니다.\n\n・물병자리: 공간을 소중히 하는 날. 영역을 제대로 정비합니다. 지킵니다.\n\n・물고기자리: 가볍게 움직이는 날. 좋아하는 것을 위해 적극적으로 행동을 시작합니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260222.txt": "제목: [이시이유카리] 2026년 2월 22일 (일요일) 일일 운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 2월 22일 (일요일) | 번역: 하라리\n\n---\n\n오늘의 천체 배치 (일본 정오 기준)\n\n아침 8시 반경, 달은 양자리에서 황소자리로 이동합니다.\n최근 지(地)의 별자리가 부족했는데, 조금 안정되는 느낌이 있을 수 있습니다.\n하지만 들어가자마자 명왕성과 스퀘어를 이루며, 경제 활동 전반에 강한 영향을 미칩니다.\n\n---\n\n・양자리: 준비를 하는 느낌의 날입니다. 물리적으로 무언가 \"만들어두는\" 것이 있습니다.\n\n・황소자리: 힘이 모이는 날입니다. 여러 가지 손응답이 있습니다. 여러 사람들이 응답해줍니다.\n\n・쌍둥이자리: 선두에 서면 자연스럽게 후원받는, 그런 날입니다. 백업이 있습니다.\n\n・게자리: 가능성이 보이는 날입니다. 전망이 서게 됩니다. 계획이 구체화됩니다.\n\n・사자자리: 기합이 들어가는 날입니다. 다들 함께 기합을 넣을 수 있습니다. 발걸음이 맞춰집니다.\n\n・처녀자리: 기분 좋은 날입니다. 상쾌한 순풍을 느낄 수 있습니다. 스스로 움직일 수 있습니다.\n\n・천칭자리: 조금 어깨의 힘이 빠집니다. 긴장감이 풀리고, 시야가 넓어집니다.\n\n・전갈자리: 많은 관계가 생깁니다. 사람을 만나거나, 만날 약속을 합니다.\n\n・사수자리: 좋은 움직임이 가능한 날입니다. 몸이 가볍습니다. 현장에 가서, 실물을 만져보고 알게 되는 것이 있습니다.\n\n・염소자리: 매우 즐거운 날입니다. 유쾌한 일이 많습니다. 왁자지껄합니다.\n\n・물병자리: 조금 속도를 늦추는 느낌의 날입니다. 평정을 되찾습니다.\n\n・물고기자리: 여기저기서 연락이 옵니다. 이쪽에서도 여러 곳에 적극적으로 나섭니다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리",
  "ishii_20260220.txt": "🌸 이시이 유카리 | 2026년 2월 20일(금) 일일 운세\n\n오늘의 천체 배치\n달은 양자리에 위치하며, 토성·해왕성의 합(컨정션)에서 명왕성과의 섹스타일(60도)로 이동합니다.\n일단 모든 스위치를 켜봤는데, 자, 과연 어떻게 될까? 하는 흐름의 하루입니다.\n\n---\n\n양자리: 어쨌든 가진 재료를 전부 꺼내놓는 듯한 전개. 힘차게 앞으로 돌진.\n\n황소자리: 매우 사려 깊은 날. 천천히 목표를 겨냥한다. 한 발 물러서서 생각해보는 것도 좋다.\n\n쌍둥이자리: 매우 넉넉하고 여유로운 날. 주변 사람들보다 시야가 세 배는 넓다. 잘 보인다.\n\n게자리: 활발하게 열심히 달리는 날. 목표가 아주 선명하게 보이고 곧장 나아갈 수 있다.\n\n사자자리: 기세가 오른다. 논리로 맞서는 듯한 느낌도 있다. 꽤 잘 싸울 수 있는 날.\n\n처녀자리: 조금 까다롭다고 생각했던 사람에 대해 문득 \"이 사람, 사실 좋은 사람이구나\"라고 깨닫는 장면이 있을지도.\n\n천칭자리: 강인한 관계의 날. 누군가와 관계하는 가운데 자기 자신의 강함과 실력을 깨닫게 된다.\n\n전갈자리: 집중력이 생기는 날. 하나의 작업에 깊이 몰입할 수 있다. 온전한 나만의 세계.\n\n사수자리: 엄청나게 즐거운 날! 어려운 퍼즐을 멋지게 풀어내는 것 같은 기쁨.\n\n염소자리: 발판을 다지는 듯한 날. 이것저것 눈이 팔리지 않는다. 굳이 천천히, 착실하게 움직인다.\n\n물병자리: 이런저런 정보가 들어와 설레는 날. 기다리던 소식이 도착한다.\n\n물고기자리: 큰 물고기를 낚아 올리는 듯한 날. 큰 것을 얻을 때는 그에 걸맞은 힘이 필요하다.\n\n---\n출처: 이시이 유카리의 별읽기 | 번역: 하라리\n",
  "ishii_20260219.txt": "제목: [이시이유카리] 2026년 2월 19일 일일 운세\n\n이시이 유카리의 오늘의 별자리 운세\n2026년 2월 19일 (목) | 번역: 하라리\n\n---\n\n오늘의 천체 배치 (일본 정오 기준)\n\n태양이 물고기자리로 이동. 우수(雨水). 달도 물고기자리로, 점성술적으로는 유사 신월 분위기.\n물고기자리에 4개 행성이 집결. 하나의 세계에서 다음 세계로 이행하는 혼란, 약간의 '무리하는' 느낌. 끌어당기고, 뒤흔들린다.\n\n---\n\n양자리 (牡羊座)\n깊이 생각하고 있다. 몰입한다. 잠시 다른 세계에 있는 듯한 하루.\n\n황소자리 (牡牛座)\n모두가 모여드는 느낌의 하루. 여기저기서 말을 걸어오고 연락이 온다.\n\n쌍둥이자리 (双子座)\n엄청나게 바쁜 가운데, 신기하게도 즐겁고 설레는 하루.\n\n게자리 (蟹座)\n머릿속의 스위치가 전환되는 듯한 하루. 테마가 명확해진다.\n\n사자자리 (獅子座)\n기분이 조금 가벼워질지도. 긴장감과 어색함이 사라진다.\n\n처녀자리 (乙女座)\n여기저기서 연락이 쏟아진다. 다양한 사람들에게 연락이 온다. 새로운 인연이 생긴다.\n\n천칭자리 (天秤座)\n바빠진다. 할 일이 산더미처럼 쌓인다. 누군가 부탁을 해올지도.\n\n전갈자리 (蠍座)\n두근두근 설레기 시작한다. 열중할 수 있는 것들이 많이 생긴다.\n\n사수자리 (射手座)\n다양한 사람들이 찾아올지도. 자신이 있는 곳의 한가운데에서 활기차다.\n\n염소자리 (山羊座)\n술술 진행되는 하루. 여러 도움의 손길을 받을 수 있다. 계속해서 문이 열린다.\n\n물병자리 (水瓶座)\n상쾌하게 여유로운 하루. 좋은 것들이 계속해서 손에 들어올 기운도.\n\n물고기자리 (魚座)\n조금 색다른 출발선에 서게 된다. 순식간에 새로운 일이 시작된다.\n\n---\n출처: 이시이 유카리의 별읽기 (star.cocoloni.jp) | 번역: 하라리\n"
};

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
        }

        function loadPosts() {
            const postList = document.getElementById('postList');
            postList.innerHTML = '';

            if (posts.length === 0) {
                postList.innerHTML = '<div class="empty-state">아직 번역된 운세가 없어요 🌸</div>';
                return;
            }

            posts.forEach((post, index) => {
                const postItem = document.createElement('div');
                postItem.className = 'post-item';
                postItem.innerHTML = `
                    <div class="post-title">${post.title}</div>
                    <div class="post-date">${formatDate(post.date)}</div>
                    <div class="post-content" id="content-${index}"></div>
                `;

                const contentDiv = postItem.querySelector(`#content-${index}`);
                contentDiv.textContent = contents[post.file] || '내용을 불러올 수 없습니다.';

                postItem.addEventListener('click', function() {
                    const content = document.getElementById(`content-${index}`);
                    const wasActive = this.classList.contains('active');
                    
                    document.querySelectorAll('.post-item').forEach(item => {
                        item.classList.remove('active');
                    });
                    document.querySelectorAll('.post-content').forEach(content => {
                        content.classList.remove('show');
                    });

                    if (!wasActive) {
                        this.classList.add('active');
                        content.classList.add('show');
                    }
                });

                postList.appendChild(postItem);
            });
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.post-item');

            items.forEach(item => {
                const title = item.querySelector('.post-title').textContent.toLowerCase();
                const date = item.querySelector('.post-date').textContent.toLowerCase();
                const content = item.querySelector('.post-content').textContent.toLowerCase();
                
                if (title.includes(searchTerm) || date.includes(searchTerm) || content.includes(searchTerm)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        });

        loadPosts();
    </script>
